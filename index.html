<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis de folios ZITRO v2.5</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="logo-container">
        <span class="logo-circle">Z</span><span class="logo-circle">I</span>
        <span class="logo-circle red">T</span><span class="logo-circle">R</span>
        <span class="logo-circle">O</span>
      </div>
      <h1>Análisis de folios Contact Center</h1>
    </header>

    <section class="panel">
      <div class="form-grid">
        <div class="input-group-wrapper">
          <label>Excel Diario</label>
          <div class="custom-file-input" id="dropZone">
            <input id="excelFile" type="file" accept=".xlsx,.xls" />
            <span id="fileNameDisplay">Arrastra o elige el archivo...</span>
          </div>
        </div>
        <div class="input-group-wrapper">
          <label>Fecha de Corte (Actualizada)</label>
          <div class="custom-date-input">
            <input id="analysisDate" type="datetime-local" />
          </div>
        </div>
      </div>
      <div class="actions">
        <button id="analyzeBtn" class="btn-primary">Ejecutar Análisis</button>
        <button id="downloadBtn" class="btn-secondary" disabled>Exportar Reporte Completo</button>
        <button id="downloadFilteredBtn" class="btn-outline" disabled>Exportar Operativo (Filtrado)</button>
      </div>
      <div id="statusBox" class="status">Listo para procesar.</div>
    </section>

    <div id="dividirModal" class="modal hidden">
      <div class="modal-content panel">
        <h3>Reparto de Folios Operativos</h3>
        <p>¿Entre cuántas personas se dividirá la carga? (Máx. 4)</p>
        <select id="numPersonas">
          <option value="1">1 Persona</option>
          <option value="2">2 Personas</option>
          <option value="3">3 Personas</option>
          <option value="4">4 Personas</option>
        </select>
        <div id="nombresInputs" class="nombres-grid">
          <input type="text" placeholder="Nombre Supervisor 1" id="p1" class="p-input">
        </div>
        <div class="actions">
          <button id="confirmExport" class="btn-primary">Descargar con Reparto</button>
          <button id="closeModal" class="btn-secondary">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="resultsSection" class="hidden">
      <h2 class="section-title">Resumen de Operación</h2>
      <div id="summaryCards" class="cards"></div>

      <div class="charts-grid">
        <div class="panel chart-container">
          <h3>Distribución por Categoría</h3>
          <div class="canvas-wrapper"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="panel chart-container">
          <h3>Volumen de Folios</h3>
          <div class="canvas-wrapper"><canvas id="barChart"></canvas></div>
        </div>
      </div>

      <section class="panel">
        <div class="table-head">
          <h2>Detalle de Folios</h2>
          <div class="filters-group">
            <select id="categoryFilter"><option value="">Categorías</option></select>
            <input id="searchInput" type="search" placeholder="Buscar folio, sala o cliente..." />
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr id="tableHeaders"></tr></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
